<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Human Evolution Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #2f2a24;
        color: #f0dec0;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(94vw, 1120px);
        display: grid;
        gap: 18px;
      }

      img {
        width: 100%;
        border-radius: 8px;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
      }

      audio {
        width: 100%;
      }

      p {
        margin: 0;
        font-size: 18px;
        line-height: 1.5;
        color: #ead8bb;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="shared-assets/evolution-preview.gif" alt="Animated preview of human evolution chapters" />
      <audio src="shared-assets/audio/soothing-evolution.wav" controls loop></audio>
      <p>Animated preview with the same generated images and soothing audio used by the HyperFrames and Remotion projects.</p>
    </main>
  </body>
</html>
