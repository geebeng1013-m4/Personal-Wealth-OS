<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f14" />
    <meta name="color-scheme" content="dark light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wealth OS" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Personal Wealth OS</title>
    <script type="module" crossorigin src="/assets/index-DkWxonc3.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Q3twpOtN.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          const isLocalDevelopment = ['localhost', '127.0.0.1'].includes(location.hostname);

          if (isLocalDevelopment) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));

            if ('caches' in window) {
              const cacheNames = await caches.keys();
              await Promise.all(
                cacheNames
                  .filter((cacheName) => cacheName.startsWith('wealth-os-'))
                  .map((cacheName) => caches.delete(cacheName)),
              );
            }
            return;
          }

          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
